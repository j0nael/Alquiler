<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor Vestuario</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- DASHBOARD -->
    <div class="dashboard">
        <h1>🎭 Sistema de Vestuario</h1>

        <div class="menu">
            <button onclick="mostrarSeccion('clientes')">Clientes</button>
            <button onclick="mostrarSeccion('categorias')">Categorías</button>
            <button onclick="mostrarSeccion('vestuarios')">Vestuario</button>
            <button onclick="mostrarSeccion('alquileres')">Alquileres</button>
        </div>
    </div>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="contenedor">

        <!-- ================= CLIENTES ================= -->
        <div id="clientes" class="seccion oculto">

            <div class="acciones">
                <button class="btn-crear" onclick="mostrarForm('formCliente')">Crear</button>
                <button class="btn-ver" onclick="listarClientes()">Ver</button>
            </div>

            <div id="formCliente" class="formulario oculto">
                <h2>Cliente</h2>

                <input type="hidden" id="clienteId">

                <input id="nombre" placeholder="Nombre">
                <span class="error" id="errorNombre"></span>

                <input id="cedula" placeholder="Cédula">
                <span class="error" id="errorCedula"></span>

                <button class="btn-guardar" onclick="guardarCliente()">Guardar</button>
            </div>

            <ul id="listaClientes" class="lista"></ul>
        </div>

        <!-- ================= CATEGORIA ================= -->
        <div id="categorias" class="seccion oculto">

            <div class="acciones">
                <button class="btn-crear" onclick="mostrarForm('formCategoria')">Crear</button>
                <button class="btn-ver" onclick="listarCategorias()">Ver</button>
            </div>

            <div id="formCategoria" class="formulario oculto">
                <h2>Categoría</h2>

                <input type="hidden" id="categoriaId">

                <input id="nombreCategoria" placeholder="Nombre">
                <span class="error" id="errorCategoria"></span>

                <button class="btn-guardar" onclick="guardarCategoria()">Guardar</button>
            </div>

            <ul id="listaCategorias" class="lista"></ul>
        </div>

        <!-- ================= VESTUARIO ================= -->
        <div id="vestuarios" class="seccion oculto">

            <div class="acciones">
                <button class="btn-crear" onclick="mostrarForm('formVestuario')">Crear</button>
                <button class="btn-ver" onclick="listarVestuarios()">Ver</button>
            </div>

            <div id="formVestuario" class="formulario oculto">
                <h2>Vestuario</h2>

                <input type="hidden" id="vestuarioId">

                <input id="nombreVestuario" placeholder="Nombre">
                <input id="talla" placeholder="Talla">
                <input id="precio" placeholder="Precio">

                <select id="categoriaSelect"></select>

                <button class="btn-guardar" onclick="guardarVestuario()">Guardar</button>
            </div>

            <ul id="listaVestuarios" class="lista"></ul>
        </div>

        <!-- ================= ALQUILER ================= -->
        <div id="alquileres" class="seccion oculto">

            <div class="acciones">
                <button class="btn-crear" onclick="mostrarForm('formAlquiler'); cargarSelects()">Crear</button>
                <button class="btn-ver" onclick="listarAlquileres()">Ver</button>
            </div>

            <div id="formAlquiler" class="formulario oculto">
                <h2>Alquiler</h2>

                <input type="hidden" id="alquilerId">

                <input type="date" id="fechaInicio">
                <input type="date" id="fechaFin">

                <input id="penalidad" placeholder="Penalidad">

                <select id="clienteSelect"></select>
                <select id="vestuarioSelect"></select>

                <button class="btn-guardar" onclick="guardarAlquiler()">Guardar</button>
            </div>

            <ul id="listaAlquileres" class="lista"></ul>
        </div>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
